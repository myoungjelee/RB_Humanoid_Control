session_name: rb_m5_stand_sanity
start_directory: /home/leemou/Projects/RB_Humanoid_Control
shell_command_before:
  - export RUN_ID="${RUN_ID:?Set RUN_ID before tmuxp load}"
  - export BASE="$HOME/Projects/RB_Humanoid_Control/logs/sim2real/m5/$RUN_ID"
  - export CAPTURE_MAX_SEC="${CAPTURE_MAX_SEC:-180}"
  - export POST_SYNC_CAPTURE_SEC="${POST_SYNC_CAPTURE_SEC:-60}"
  - export AUTO_KILL_AFTER_CAPTURE="${AUTO_KILL_AFTER_CAPTURE:-1}"
  - mkdir -p "$BASE/m5"
windows:
  - window_name: m5_stand_sanity
    layout: main-vertical
    panes:
      - shell_command:
          - cd /home/leemou/Projects/RB_Humanoid_Control
          # - python main.py --phase m5_stand 2>&1 | tee "$BASE/m5/isaac.log"
          - python main.py --phase m5_stand --headless 2>&1 | tee "$BASE/m5/isaac.log"
      - shell_command:
          - cd /home/leemou/Projects/RB_Humanoid_Control/ros2_ws
          - source /opt/ros/humble/setup.bash
          - source install/setup.bash
          - echo "[RUN] launching controller immediately; sync markers will align analysis later"
          - timeout "$CAPTURE_MAX_SEC" ros2 launch rb_controller controller.launch.py params_file:=/home/leemou/Projects/RB_Humanoid_Control/ros2_ws/src/rb_controller/config/scenarios/stand_pd_sanity.yaml 2>&1 | tee "$BASE/m5/m5_stand_sanity.log"
          - exec bash
      - shell_command:
          - echo "[WAIT] waiting for controller start log"
          - until rg -q "rb_controller started" "$BASE/m5/m5_stand_sanity.log" 2>/dev/null; do sleep 1; done
          - echo "[WAIT] waiting for FIRST_SIM_STEP in isaac.log (max ${CAPTURE_MAX_SEC}s)"
          - 'for i in $(seq 1 "$CAPTURE_MAX_SEC"); do if rg -q "\[SYNC\] FIRST_SIM_STEP" "$BASE/m5/isaac.log" 2>/dev/null; then echo "[EVENT] first sim step detected"; break; fi; sleep 1; done'
          - 'if ! rg -q "\[SYNC\] FIRST_SIM_STEP" "$BASE/m5/isaac.log" 2>/dev/null; then echo "[FALLBACK] no FIRST_SIM_STEP within ${CAPTURE_MAX_SEC}s"; fi'
          - echo "[WAIT] capturing ${POST_SYNC_CAPTURE_SEC}s window after FIRST_SIM_STEP"
          - 'sleep "$POST_SYNC_CAPTURE_SEC"'
          - rg "rb_controller started|stand_control_joints|stand_tilt_cut|tilt_feedback" "$BASE/m5/m5_stand_sanity.log" | head -n 12 | tee "$BASE/m5/start.txt"
          - 'if rg -q "\[FALL_EVENT\]" "$BASE/m5/isaac.log" 2>/dev/null; then rg "\[FALL_EVENT\]" "$BASE/m5/isaac.log" | tail -n 1 | tee "$BASE/m5/fall_event.txt"; else echo "[NO_FALL_EVENT] capture_window_sec=${POST_SYNC_CAPTURE_SEC}" | tee "$BASE/m5/fall_event.txt"; fi'
          - 'echo "[ISAAC]" > "$BASE/m5/sync_markers.txt"'
          - 'rg "\[SYNC\]|\[FALL_EVENT\]" "$BASE/m5/isaac.log" >> "$BASE/m5/sync_markers.txt" || true'
          - 'echo "[CONTROLLER]" >> "$BASE/m5/sync_markers.txt"'
          - 'rg "\[SYNC\]|rb_controller started" "$BASE/m5/m5_stand_sanity.log" >> "$BASE/m5/sync_markers.txt" || true'
          - 'cat "$BASE/m5/sync_markers.txt"'
          - echo "safety_disabled_for_stand_pd_sanity" | tee "$BASE/m5/reason_count.txt"
          - 'awk ''BEGIN{flag=0;count=0} /\[SYNC\] CONTROL_ACTIVE/{flag=1; next} flag && /loop_stats/ {print; count++; if (count>=12) exit}'' "$BASE/m5/m5_stand_sanity.log" > "$BASE/m5/loop_post_sync.txt"'
          - 'if [ ! -s "$BASE/m5/loop_post_sync.txt" ]; then rg "loop_stats" "$BASE/m5/m5_stand_sanity.log" | head -n 12 > "$BASE/m5/loop_post_sync.txt"; fi'
          - 'cat "$BASE/m5/loop_post_sync.txt"'
          - 'rg "loop_stats" "$BASE/m5/m5_stand_sanity.log" | tail -n 12 > "$BASE/m5/loop_before_fall.txt"'
          - 'cat "$BASE/m5/loop_before_fall.txt"'
          - echo "[CAPTURE] stand_pd_sanity first_sim_step + fixed_window capture + sync_markers + loop_post_sync + loop_before_fall"
          - 'if [ "${AUTO_KILL_AFTER_CAPTURE}" = "1" ]; then echo "[SESSION] auto-kill session after fixed capture window"; tmux kill-session -t rb_m5_stand_sanity; fi'
          - exec bash
