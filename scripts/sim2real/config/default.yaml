sim2real:
  phase: m1_sensor

  m1_sensor:
    task: flat
    num_envs: 1
    steps: -1
    progress_log_interval_sec: 10.0
    disable_fabric: false
    reset_on_done: true
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    # null이면 IsaacLab 기본(Nucleus) 경로 사용.
    # 로컬 USD를 고정하려면 절대경로 지정:
    # /home/leemou/Projects/RB_Humanoid_Control/sim/isaac_scenes/g1_local.usd
    robot_usd_path: null
    enable_ros2_bridge: true
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
    graph_builder:
      enabled: true
      strict: true
      graph_path: /RBM1Graph
      robot_prim: /World/envs/env_0/Robot/pelvis
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: imu_link

  m3_command:
    task: flat
    num_envs: 1
    steps: -1
    progress_log_interval_sec: 10.0
    disable_fabric: false
    reset_on_done: true
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    robot_usd_path: null
    enable_ros2_bridge: true
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
      command_raw: /rb/command_raw
    graph_builder:
      enabled: true
      strict: true
      graph_path: /RBM3Graph
      robot_prim: /World/envs/env_0/Robot/pelvis
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: imu_link
