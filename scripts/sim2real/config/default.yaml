sim2real:
  phase: m5_stand

  m1_sensor:
    task: flat
    num_envs: 1
    steps: -1
    progress_log_interval_sec: 10.0
    disable_fabric: false
    reset_on_done: true
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    # null이면 IsaacLab `isaaclab_assets.robots.unitree.G1_CFG` 경로 사용.
    # 로컬/커스텀 G1 USD를 강제하려면 절대경로 지정:
    robot_usd_path: null
    enable_ros2_bridge: true
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
    graph_builder:
      enabled: true
      strict: true
      graph_path: /RBM1Graph
      robot_prim: /World/envs/env_0/Robot/pelvis
      imu_prim: auto
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: auto

  m3_command:
    task: flat
    num_envs: 1
    steps: -1
    progress_log_interval_sec: 10.0
    disable_fabric: false
    reset_on_done: true
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    robot_usd_path: null
    enable_ros2_bridge: true
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
      command_raw: /rb/command_raw
    graph_builder:
      enabled: true
      strict: true
      graph_path: /RBM3Graph
      robot_prim: /World/envs/env_0/Robot/pelvis
      imu_prim: auto
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: auto

  m5_stand:
    task: stand
    num_envs: 1
    steps: -1
    stop_on_fall_event: true
    progress_log_interval_sec: 10.0
    disable_fabric: false
    # M5 기본 실행은 넘어지면 자동 리셋해 반복 관측한다.
    reset_on_done: true
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    robot_usd_path: null
    spawn_joint_seed_path: ros2_ws/src/rb_bringup/config/stand_qref_g1_seed.yaml
    spawn_root_height_z: 0.74
    ankle_actuator_override:
      enabled: true
      stiffness: 80.0
      damping: 8.0
      effort_limit_sim: 40.0
    fall_watch:
      enabled: true
      min_elapsed_sec: 0.1
      pelvis_z_threshold: 0.30
      torso_z_threshold: 0.40
      torso_body_name_candidates: [torso_link, torso, base_link]
    enable_ros2_bridge: true
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
      command_raw: /rb/command_safe
    graph_builder:
      enabled: true
      strict: true
      graph_path: /RBM5Graph
      robot_prim: /World/envs/env_0/Robot/pelvis
      imu_prim: auto
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: auto

  m5_pose_audit:
    task: stand
    num_envs: 1
    steps: -1
    progress_log_interval_sec: 10.0
    disable_fabric: false
    reset_on_done: false
    sim_dt: 0.005
    decimation: 1
    substeps: 1
    robot_usd_path: null
    spawn_joint_seed_path: ros2_ws/src/rb_bringup/config/stand_qref_g1_seed.yaml
    spawn_root_height_z: 0.74
    ankle_actuator_override:
      enabled: false
    pose_audit_relax_arms: true
    pose_audit_arm_stiffness: 8.0
    pose_audit_arm_damping: 1.5
    startup_joint_dump_path: m5/startup_joint_pos.yaml
    start_paused: true
    fall_watch:
      enabled: false
    enable_ros2_bridge: false
    bridge_extension: isaacsim.ros2.bridge
    topics:
      joint_states: /rb/joint_states
      imu: /rb/imu
      clock: /clock
      command_raw: /rb/command_safe
    graph_builder:
      enabled: false
      strict: true
      graph_path: /RBM5PoseAuditGraph
      robot_prim: /World/envs/env_0/Robot/pelvis
      imu_prim: auto
      tick_source: on_physics_step
      tick_only_playback: false
      tick_frame_period: 0
      frame_ids:
        imu: auto
