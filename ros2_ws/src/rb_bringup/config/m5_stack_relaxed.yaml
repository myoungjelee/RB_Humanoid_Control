rb_estimator:
  ros__parameters:
    input_joint_states_topic: /rb/joint_states
    input_imu_topic: /rb/imu
    output_estimated_state_topic: /rb/estimated_state
    input_stale_timeout_sec: 0.10

rb_safety:
  ros__parameters:
    # Smoke용 relaxed safety.
    # 실제 joint lower/upper는 xacro와 같은 값을 유지하고,
    # tilt gate만 완화해서 "controller가 얼마나 버티는지"를 먼저 본다.
    input_command_topic: /rb/command_raw
    output_command_topic: /rb/command_safe
    input_joint_states_topic: /rb/joint_states
    input_estimated_state_topic: /rb/estimated_state
    imu_topic: /rb/imu
    safety_enabled: true
    safe_mode_action: zero_effort
    effort_abs_max_default: 18.0
    joint_limit_margin_rad: 0.0
    input_timeout_sec: 0.5
    tilt_limit_roll_rad: 1.2
    tilt_limit_pitch_rad: 1.2
    velocity_limit_default_rad_s: 8.0
    velocity_limit_ankle_rad_s: 12.0
    watchdog_rate_hz: 100.0
    joint_limits:
      left_hip_pitch_joint: {lower: -2.349999711181, upper: 3.049999885799}
