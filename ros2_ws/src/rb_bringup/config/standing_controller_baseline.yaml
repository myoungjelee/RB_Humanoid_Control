# ros2_control 기본 bringup 설정
# - rb_effort_forward_controller: 전환형(adapter) 경로 점검용 표준 relay controller
# - rb_standing_controller: 최종 native path로 옮길 custom standing controller plugin
# 현재 repo는 두 경로를 모두 들고 있고, launch에서 둘 중 하나만 켜도록 한다.

controller_manager:
  ros__parameters:
    update_rate: 200

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    # ros2_control -> hardware_interface.write() 경로를 먼저 검증하기 위한 표준 컨트롤러
    # /rb_effort_forward_controller/commands 로 effort 배열을 넣으면
    # controller_manager가 그 값을 hardware interface command buffer에 적고,
    # RBHardwareSystem.write()가 이를 Isaac command topic으로 내보낸다.
    rb_effort_forward_controller:
      type: forward_command_controller/ForwardCommandController

    # native ros2_control standing controller.
    # 기존 rb_controller_node의 stand_pd 핵심 계산을 plugin 안으로 옮겨,
    # controller_manager가 직접 low-level effort를 쓰게 만든다.
    rb_standing_controller:
      type: rb_standing_controller/RBStandingController

rb_effort_forward_controller:
  ros__parameters:
    interface_name: effort
    joints:
      - left_hip_pitch_joint
      - right_hip_pitch_joint
      - torso_joint
      - left_hip_roll_joint
      - right_hip_roll_joint
      - left_shoulder_pitch_joint
      - right_shoulder_pitch_joint
      - left_hip_yaw_joint
      - right_hip_yaw_joint
      - left_shoulder_roll_joint
      - right_shoulder_roll_joint
      - left_knee_joint
      - right_knee_joint
      - left_shoulder_yaw_joint
      - right_shoulder_yaw_joint
      - left_ankle_pitch_joint
      - right_ankle_pitch_joint
      - left_elbow_pitch_joint
      - right_elbow_pitch_joint
      - left_ankle_roll_joint
      - right_ankle_roll_joint
      - left_elbow_roll_joint
      - right_elbow_roll_joint
      - left_five_joint
      - left_three_joint
      - left_zero_joint
      - right_five_joint
      - right_three_joint
      - right_zero_joint
      - left_six_joint
      - left_four_joint
      - left_one_joint
      - right_six_joint
      - right_four_joint
      - right_one_joint
      - left_two_joint
      - right_two_joint

rb_standing_controller:
  ros__parameters:
    # joint position/velocity는 ros2_control state interface에서 읽고,
    # tilt/rate 같은 보조 추정값만 /rb/estimated_state에서 받는다.
    estimated_state_topic: /rb/estimated_state
    joints:
      - left_hip_pitch_joint
      - right_hip_pitch_joint
      - torso_joint
      - left_hip_roll_joint
      - right_hip_roll_joint
      - left_shoulder_pitch_joint
      - right_shoulder_pitch_joint
      - left_hip_yaw_joint
      - right_hip_yaw_joint
      - left_shoulder_roll_joint
      - right_shoulder_roll_joint
      - left_knee_joint
      - right_knee_joint
      - left_shoulder_yaw_joint
      - right_shoulder_yaw_joint
      - left_ankle_pitch_joint
      - right_ankle_pitch_joint
      - left_elbow_pitch_joint
      - right_elbow_pitch_joint
      - left_ankle_roll_joint
      - right_ankle_roll_joint
      - left_elbow_roll_joint
      - right_elbow_roll_joint
      - left_five_joint
      - left_three_joint
      - left_zero_joint
      - right_five_joint
      - right_three_joint
      - right_zero_joint
      - left_six_joint
      - left_four_joint
      - left_one_joint
      - right_six_joint
      - right_four_joint
      - right_one_joint
      - left_two_joint
      - right_two_joint
    command_interface_name: effort
    state_interface_names:
      - position
      - velocity
      - effort
    # 공통 standing baseline은 현재까지 disturbance compare에서 가장 안정적이었던
    # M8 tuned 값으로 둔다. M5/M7/M8는 이 값을 함께 쓰고, milestone별 차이는
    # safety profile과 enable_tilt_feedback overlay에서만 둔다.
    # M11에서 더 정밀한 tuning이 끝나면 그 값을 새 baseline으로 승격한다.
